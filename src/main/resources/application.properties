spring.application.name=EasyITP
# URL-ul de conectare (am adaugat jdbc: in fata si am scos user/parola din link)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/itp}

# Datele de autentificare
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# Driver-ul de PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# Setari Hibernate pentru a crea si actualiza automat tabelele
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=true
# Jackson — serialize dates as ISO strings not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# Multipart file upload (CSV import)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${PORT:8080}

# JWT Configuration
jwt.secret=${JWT_SECRET:my-very-secret-default-key-for-local-dev}
jwt.expiration-ms=86400000
